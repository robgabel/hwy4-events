<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B4A3A"/>
      <stop offset="100%" stop-color="#2A3629"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- Beer glass -->
  <g transform="translate(100,100)">
    <!-- Glass body -->
    <path d="M-22 -40 L-18 40 L18 40 L22 -40 Z" fill="#D4A553" opacity="0.85"/>
    <!-- Beer foam -->
    <ellipse cx="0" cy="-40" rx="22" ry="6" fill="#F5E6C8"/>
    <ellipse cx="-8" cy="-44" rx="8" ry="5" fill="#FFF8EC" opacity="0.9"/>
    <ellipse cx="8" cy="-42" rx="7" ry="4" fill="#FFF8EC" opacity="0.8"/>
    <ellipse cx="0" cy="-46" rx="6" ry="3" fill="#FFF8EC" opacity="0.7"/>
    <!-- Glass shine -->
    <path d="M-16 -30 L-14 30" stroke="#F5E6C8" stroke-width="2" opacity="0.3"/>
    <!-- Handle -->
    <path d="M22 -20 Q42 -15 42 5 Q42 25 22 30" fill="none" stroke="#D4A553" stroke-width="5" opacity="0.75"/>
    <!-- Bubbles -->
    <circle cx="-5" cy="10" r="2" fill="#F5E6C8" opacity="0.4"/>
    <circle cx="5" cy="0" r="1.5" fill="#F5E6C8" opacity="0.3"/>
    <circle cx="-8" cy="-15" r="1.5" fill="#F5E6C8" opacity="0.35"/>
    <circle cx="3" cy="20" r="2" fill="#F5E6C8" opacity="0.3"/>
  </g>
  <!-- Hop leaf accents -->
  <g opacity="0.2">
    <path d="M30 30 Q45 15 40 35 Q35 20 30 30Z" fill="#8B9E7E"/>
    <path d="M160 160 Q175 145 170 165 Q165 150 160 160Z" fill="#8B9E7E"/>
  </g>
</svg>
